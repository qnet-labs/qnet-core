name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── Rust library & docs (non-Python sanity checks) ──────────────
  rust-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo check --all-targets
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets -- -D warnings

  python-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install maturin ruff mypy
      - run: maturin develop -o dist
      - run: ruff check python/
      - run: mypy python/

  # ── Cross-platform wheel builds ──────────────────────────────────
  rust-build:
    runs-on: ${{ matrix.target.os }}
    strategy:
      fail-fast: false
      matrix:
        target:
          # Linux — x86_64 (manylinux2014)
          - os: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            maturin_name: manylinux_x86_64
          # Linux — aarch64 (manylinux2014)
          - os: ubuntu-latest
            rust_target: aarch64-unknown-linux-gnu
            maturin_name: manylinux_aarch64
          # macOS — x86_64
          - os: macos-13
            rust_target: x86_64-apple-darwin
            maturin_name: macos_x86_64
          # macOS — Apple Silicon (aarch64)
          - os: macos-14
            rust_target: aarch64-apple-darwin
            maturin_name: macos_aarch64
          # Windows — x86_64
          - os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            maturin_name: windows_x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target.rust_target }}
          # Condensed onto a single line to prevent YAML syntax errors
          image: ${{ startsWith(matrix.target.maturin_name, 'manylinux') && 'manylinux2014' || '' }}
          args: --release --out wheels --interpreter cp38 cp39 cp310 cp311 cp312 cp313 --manifest-path Cargo.toml

      - run: |
          mkdir -p dist/${{ matrix.target.maturin_name }}/
          for whl in wheels/*.whl; do
            mv "$whl" "dist/${{ matrix.target.maturin_name }}/"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target.maturin_name }}
          path: dist/

  # ── Build source distribution ────────────────────────────────────
  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install maturin build
      - run: maturin sdist --out dist/
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist/

  # ── Publish to PyPI ──────────────────────────────────────────────
  publish:
    needs: [rust-check, python-check, rust-build, sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist/
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
