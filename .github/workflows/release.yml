name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── Rust library & docs (non-Python sanity checks) ──────────────
  rust-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo check --all-targets
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets -- -D warnings

  python-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install maturin ruff mypy
          maturin develop
          ruff check python/
          mypy python/

  # ── Cross-platform wheel builds + publish ────────────────────────
  rust-build:
    runs-on: ${{ matrix.target.os }}
    permissions:
      id-token: write
      contents: read
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    strategy:
      fail-fast: false
      matrix:
        target:
          # Linux — x86_64 (manylinux2014)
          - os: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            maturin_name: manylinux_x86_64
          # Linux — aarch64 (manylinux2014)
          - os: ubuntu-latest
            rust_target: aarch64-unknown-linux-gnu
            maturin_name: manylinux_aarch64
          # macOS — x86_64
          - os: macos-14
            rust_target: x86_64-apple-darwin
            maturin_name: macos_x86_64
          # macOS — Apple Silicon (aarch64)
          - os: macos-14
            rust_target: aarch64-apple-darwin
            maturin_name: macos_aarch64
          # Windows — x86_64
          - os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            maturin_name: windows_x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target.rust_target }}
          # No --interpreter on native runners — maturin auto-detects system Python.
          # Linux builds get abi3 compatibility (unlimited Python version tag) from pyo3/abi3.
          args: --release --out dist

      - name: Publish wheel to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          password: ${{ secrets.PYPI_API_TOKEN }}

  # ── Build source distribution + publish ─────────────────────────
  sdist:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install maturin build
      - run: maturin sdist --out dist/
      - name: Publish sdist to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          password: ${{ secrets.PYPI_API_TOKEN }}
